<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honeypot Control Center</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/script.js" defer></script>
</head>
<body class="admin-body">

  <div class="cyber-grid"></div>
  <div class="scanline"></div>

  <div class="admin-wrapper">
    <div class="admin-header">
      <div>
        <p class="panel-tag">Threat Monitoring Dashboard</p>
        <h1>HONEYPOT CONTROL CENTER</h1>
        <p class="admin-subtitle">
          Real-time monitoring interface for suspicious login activity and demo event logs.
        </p>
      </div>
      <a href="/" class="back-btn">Return to Login Page</a>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <span class="stat-label">System Status</span>
        <strong>ACTIVE</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">Threat Logging</span>
        <strong>ENABLED</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">Monitoring Mode</span>
        <strong>LIVE</strong>
      </div>
    </div>

    <div class="table-shell">
      <table id="logtable">
        <tr>
          <th>Timestamp</th>
          <th>Source IP</th>
          <th>Operator ID</th>
          <th>Browser Signature</th>
        </tr>
      </table>
    </div>
  </div>

</body>
</html>
